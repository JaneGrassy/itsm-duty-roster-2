<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>График дежурств — Вариант 3 (кластеры × даты, компакт)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
  /* Вариант 3 стилизован под прод-систему (Fido-Biznes "Ресурсы"): Roboto,
     голубые колонки выходных, жёлтые счётчики часов/людей, оранжевая рамка
     "сегодня", плоские цветные бары вместо карточек с обводкой. */
  :root {
    --font-sans: "Roboto", -apple-system, "Segoe UI", Arial, sans-serif;
    --shell-bg: #4a4a4a;
    --panel-border: #d9dce2;
    --panel-shadow: 0 2px 10px rgba(16, 24, 40, 0.14);
    --label-col-w: 350px;
    --day-w-fixed: 48.25px;
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    display: flex;
    flex-direction: column;
    background: var(--shell-bg);
  }

  .app-shell {
    width: min(1920px, calc(100vw - 40px));
    margin: 20px auto;
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: 40px minmax(0, 1fr);
    background: #fff;
    border: 1px solid rgba(255, 255, 255, 0.22);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
  }

  .app-rail {
    background: #fff;
    border-right: 1px solid #e7e7e7;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 10px 0;
  }
  .rail-burger {
    width: 18px;
    height: 14px;
    position: relative;
    margin-bottom: 8px;
  }
  .rail-burger::before,
  .rail-burger::after,
  .rail-burger span {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    border-radius: 999px;
    background: #7b7b7b;
  }
  .rail-burger::before { top: 0; }
  .rail-burger span { top: 6px; }
  .rail-burger::after { bottom: 0; }
  .rail-dot {
    width: 18px;
    height: 18px;
    border-radius: 5px;
    border: 1px solid #d7d7d7;
    background: linear-gradient(180deg, #fff, #f4f4f4);
    position: relative;
  }
  .rail-dot.is-active::before {
    content: "";
    position: absolute;
    inset: 4px;
    border-radius: 3px;
    background: #7aa8ff;
  }

  .app-main {
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: #fbfbfb;
  }

  .app-topbar {
    height: 40px;
    background: #fff;
    border-bottom: 1px solid #ebebeb;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
  }
  .brand {
    font-size: 14px;
    font-weight: 700;
    color: #2161c2;
  }
  .brand span { color: #f79009; }
  .topbar-icons {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .topbar-icons i {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1px solid #aeb4bf;
    display: inline-block;
    background: #fff;
  }
  .topbar-icons i.is-orange { border-color: #f79009; }
  .topbar-icons i.is-blue { border-color: #84a9ff; background: #eef4ff; }
  .topbar-avatar {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, #d5dae3, #9aa4b5);
  }

  .workspace {
    flex: 1;
    min-height: 0;
    overflow: auto;
    padding: 12px;
  }

  .screen-card {
    min-width: 1702px;
    background: #fff;
    border: 1px solid var(--panel-border);
    border-radius: 2px;
    box-shadow: var(--panel-shadow);
  }

  .screen-header {
    padding: 10px 12px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .screen-title {
    margin: 0;
    font-size: 12px;
    line-height: 18px;
    font-weight: 500;
    color: #5b5f67;
  }

  .tl-wrap {
    flex: 1;
    overflow: auto;
    position: relative;
    background: #fff;
    min-height: 540px;
  }

  .tl-grid {
    display: grid;
    position: relative;
  }

  /* corner + headers */
  .corner-cell {
    position: sticky;
    top: 0; left: 0;
    z-index: 9;
    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    border-right: 1px solid var(--gray-200);
    grid-column: 1;
    grid-row: 1 / span 2;
    display: flex;
    align-items: flex-end;
    padding: 5px 8px;
    font-size: 11px;
    font-weight: 400;
    color: var(--gray-500);
  }
  .sprint-head-cell {
    position: sticky;
    top: 0;
    z-index: 6;
    background: var(--gray-50);
    border-bottom: 1px solid var(--gray-200);
    border-left: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
    color: #4f5560;
    height: 20px;
    overflow: hidden;
    white-space: nowrap;
  }
  .sprint-head-cell > span { overflow: hidden; text-overflow: ellipsis; }
  .day-head-cell {
    position: sticky;
    z-index: 6;
    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    border-left: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 400;
    color: #6a6f78;
    height: 20px;
    white-space: nowrap;
    overflow: hidden;
  }
  .day-head-cell.is-weekend { background: #DBEAF7; }
  .day-head-cell.is-weekend .d-num { color: var(--error-500); }
  .day-head-cell.is-today {
    background: #FFEAD5;
    border-left: 2px solid #F79009;
    border-right: 2px solid #F79009;
    font-weight: 700;
  }

  /* Колонка "сегодня" — две оранжевые вертикали, как в проде */
  .today-col {
    position: absolute;
    top: 0;
    border-left: 2px solid #F79009;
    border-right: 2px solid #F79009;
    z-index: 4;
    pointer-events: none;
    box-sizing: border-box;
  }

  /* --- строка-кластер --- */
  .cluster-row {
    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    border-top: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    font-size: 11px;
    font-weight: 700;
    color: #4b4f56;
  }
  .cluster-row .cluster-label {
    position: sticky;
    left: 0;
    padding: 2px 8px;
  }

  /* --- строка-продукт --- */
  .product-label {
    position: sticky;
    left: 0;
    z-index: 3;
    background: #fff;
    border-right: 1px solid var(--gray-200);
    border-bottom: 1px solid var(--gray-100);
    padding: 0 8px;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 400;
    color: #5a6069;
    cursor: pointer;
    user-select: none;
  }
  .product-label:hover { background: var(--gray-25); }
  .product-label.is-nested { padding-left: 12px; }
  .product-label .p-chev {
    width: 10px; height: 10px;
    color: #55a860;
    flex: none;
    transition: transform .15s;
  }
  .product-label .p-team {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #7bc67e;
    flex: none;
  }
  .product-label[aria-expanded="false"] .p-chev { transform: rotate(-90deg); }
  .product-label .p-count {
    margin-left: auto;
    font-size: 10px;
    color: #6d7480;
    white-space: nowrap;
  }
  @media (prefers-reduced-motion: reduce) { .product-label .p-chev { transition: none; } }

  .product-body {
    position: relative;
    border-bottom: 1px solid var(--gray-100);
    background: #fff;
    cursor: pointer;
  }
  .product-body.is-expanded { cursor: default; }
  .product-body .col-bg {
    position: absolute;
    top: 0; bottom: 0;
    border-left: 1px solid var(--gray-100);
  }
  .product-body .col-bg.weekend { background: #E9F2FB; }

  /* Счётчик дежурных — жёлтые ячейки во всю клетку, как часы в проде */
  .count-cell {
    position: absolute;
    top: 1px; bottom: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 400;
    border-radius: 0;
    box-sizing: border-box;
  }
  .count-cell.c-some { background: #FFF9C0; color: #6b5b0e; }
  .count-cell.c-many { background: #FDE272; color: #5c470a; }
  .count-cell.c-zero { background: #FDDCDB; color: #b42318; }

  .product-body .empty-dash-abs {
    position: absolute;
    top: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* --- строка-заголовок продукта: только фон колонок (+ счётчики, если
     продукт свёрнут); бары/люди рендерятся ниже, по одному человеку на
     строку --- */
  .row-header-body { position: relative; border-bottom: 1px solid var(--gray-100); }
  .row-header-body .col-bg { position: absolute; top: 0; bottom: 0; border-left: 1px solid var(--gray-100); }
  .row-header-body .col-bg.weekend { background: #E9F2FB; }

  /* --- строка-человек: 1 человек = 1 строка, как в проде --- */
  .lane-spacer {
    position: sticky;
    left: 0;
    z-index: 3;
    background: #fff;
    border-right: 1px solid var(--gray-200);
    border-bottom: 1px solid var(--gray-100);
  }

  .event-lane {
    position: relative;
    border-bottom: 1px solid var(--gray-100);
    background: #fff;
  }

  .event-lane .col-bg { position: absolute; top: 0; bottom: 0; border-left: 1px solid var(--gray-100); }
  .event-lane .col-bg.weekend { background: #E9F2FB; }
  .event-lane .duty-card {
    position: absolute;
    box-sizing: border-box;
    top: 2px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    border: 1px solid var(--card-color);
    border-radius: 4px;
    background: #fff;
    box-shadow: none;
    padding: 6px 7px;
    gap: 6px;
  }
  .event-lane .duty-card .dc-moon { width: 11px; height: 11px; color: var(--card-color); }
  .event-lane .duty-card.shift-night { background: #f8f6ff; color: var(--gray-700); }
  .event-lane .duty-card.shift-weekend {
    background: #fffdf2;
    border-style: dashed;
  }
  .event-lane .duty-card:hover,
  .event-lane .duty-card:focus-visible,
  .event-lane .duty-card.is-highlight { box-shadow: var(--shadow-md); }
  .event-lane .duty-card.is-dimmed { opacity: .35; }
  .event-lane .duty-card .dc-name {
    font-size: 11px;
    line-height: 13px;
    color: #40454f;
  }
  .event-lane .duty-card .dc-range {
    font-size: 10px;
    line-height: 12px;
    color: #757b87;
  }
  .event-lane .duty-card.compact {
    justify-content: center;
    padding: 4px;
  }

  /* --- форма "Дежурство" --- */
  .form-field { margin-bottom: 12px; }
  .form-field > label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: #525866;
    margin-bottom: 4px;
  }
  .form-field > label .req { color: var(--error-500); }
  .form-field select,
  .form-field input[type="date"],
  .form-field input[type="search"] {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid #d6dae1;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    color: #4f5560;
    background: #fff;
    min-height: 42px;
  }
  .form-row { display: flex; gap: 20px; }
  .form-row .form-field { flex: 1; }
  .duty-people-list {
    border: 1px solid #d6dae1;
    border-radius: 8px;
    max-height: 420px;
    overflow-y: auto;
    padding: 8px 0;
  }
  .duty-person-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 16px;
    border-radius: 6px;
    font-size: 14px;
    color: var(--gray-900);
    cursor: pointer;
  }
  .duty-person-row:hover { background: var(--gray-50); }
  .duty-person-row input { accent-color: var(--brand-600); width: 16px; height: 16px; }
  .duty-people-empty { padding: 10px; font-size: 13px; color: var(--gray-400); }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding: 16px 24px 22px;
    border-top: 1px solid #eceff4;
    flex: none;
  }
  .form-error { color: var(--error-500); font-size: 13px; margin-right: auto; align-self: center; }

  .filters-bar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 14px;
    padding: 8px 12px 10px;
    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    flex-wrap: wrap;
  }
  .filters-left,
  .filters-right {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-wrap: wrap;
  }
  .filters-right { margin-left: auto; }
  .filter-field {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 180px;
  }
  .field-label {
    font-size: 10px;
    line-height: 14px;
    color: #6f7681;
  }
  .field-label .req { color: var(--error-500); }
  .field-meta {
    color: #8a909a;
    margin-left: auto;
    padding-left: 8px;
    font-size: 10px;
  }
  .select-like {
    appearance: none;
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    min-width: 200px;
    height: 27px;
    padding: 0 8px;
    border: 1px solid #d8dbe1;
    border-radius: 2px;
    background: linear-gradient(180deg, #fff, #fafafa);
    color: #4d535c;
    font-size: 11px;
    font-weight: 400;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    cursor: pointer;
    position: relative;
  }
  .select-like::after {
    content: "\25BE";
    color: #7d838d;
    font-size: 9px;
    margin-left: 12px;
  }
  .select-like[aria-disabled="true"] {
    cursor: default;
  }
  .native-select {
    -webkit-appearance: none;
    appearance: none;
    display: block;
    width: 200px;
    min-width: 200px;
    line-height: 25px;
    text-align: left;
    font-family: inherit;
    padding: 0 28px 0 8px;
    background:
      linear-gradient(180deg, #fff, #fafafa),
      linear-gradient(45deg, transparent 50%, #7d838d 50%),
      linear-gradient(135deg, #7d838d 50%, transparent 50%);
    background-repeat: no-repeat;
    background-position: 0 0, calc(100% - 14px) 11px, calc(100% - 9px) 11px;
    background-size: 100% 100%, 5px 5px, 5px 5px;
    cursor: pointer;
  }
  .native-select::after { content: none; }
  .period-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 27px;
    margin-bottom: 0;
  }
  .compact-nav {
    width: 27px;
    height: 27px;
    border-radius: 2px;
    box-shadow: none;
    color: #6b7280;
  }
  .period-label {
    min-width: 220px;
    height: 27px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: #555b65;
    border: 1px solid #d8dbe1;
    border-radius: 2px;
    background: #fff;
    padding: 0 10px;
    box-sizing: border-box;
  }
  .btn.btn-quiet,
  .btn.btn-ghost {
    height: 27px;
    padding: 0 8px;
    font-size: 10px;
    font-weight: 400;
    border-radius: 2px;
    box-shadow: none;
  }
  .btn.btn-quiet {
    background: #f5f6f7;
    border-color: #d7dbe2;
    color: #6c737f;
  }
  .btn.btn-add-duty {
    height: 18px;
    padding: 0 10px;
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    background: #8b88f8;
    border-color: #8b88f8;
    border-radius: 3px;
    box-shadow: none;
    flex: none;
  }
  .btn.btn-add-duty:hover { background: #7d79f2; }
  .duty-modal {
    max-width: 950px !important;
    border-radius: 12px;
    box-shadow: 0 14px 40px rgba(16, 24, 40, 0.24);
  }
  .duty-modal .modal-header {
    padding: 14px 18px;
    border-bottom: 1px solid #e7e9ee;
  }
  .duty-modal .modal-title {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 22px;
    font-weight: 700;
    color: #2d3139;
  }
  .duty-modal .modal-title::before {
    content: "\2630";
    font-size: 18px;
    color: #2d3139;
  }
  .duty-modal .modal-close {
    width: 44px;
    height: 44px;
    border: 3px solid #2c2f36;
    border-radius: 50%;
    color: #2c2f36;
    font-size: 24px;
    line-height: 1;
  }
  .duty-modal .modal-close:hover { background: #f6f7f9; }
  .duty-modal .modal-body {
    padding: 22px 24px 16px;
  }
  .duty-modal .btn {
    min-width: 164px;
    justify-content: center;
    border-radius: 8px;
    box-shadow: none;
    font-size: 14px;
  }
  .duty-modal .btn.btn-brand {
    background: #eff8ff;
    color: #3b82c4;
    border-color: #cfe7fb;
  }
  .duty-modal .btn.btn-brand:hover { background: #e4f2fd; }
  .duty-modal .form-field {
    margin-bottom: 10px;
  }
  .duty-modal .form-field > label {
    font-size: 10px;
    line-height: 14px;
    font-weight: 700;
    color: #6f7681;
    margin-bottom: 2px;
  }
  .duty-modal .form-field > label .req {
    color: #d92d20;
  }
  .duty-modal .form-field select,
  .duty-modal .form-field input[type="date"],
  .duty-modal .form-field input[type="search"] {
    min-height: 27px;
    height: 27px;
    padding: 0 8px;
    border: 1px solid #d8dbe1;
    border-radius: 2px;
    background: linear-gradient(180deg, #fff, #fafafa);
    color: #4d535c;
    font-size: 11px;
    line-height: 16px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
  }
  .duty-modal .form-field select {
    appearance: none;
    -webkit-appearance: none;
    padding-right: 28px;
    background-image:
      linear-gradient(45deg, transparent 50%, #6b7280 50%),
      linear-gradient(135deg, #6b7280 50%, transparent 50%);
    background-position:
      calc(100% - 14px) 11px,
      calc(100% - 9px) 11px;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
  }
  .duty-modal .form-field input[type="search"]::placeholder {
    color: #8b919c;
  }
  .duty-modal .form-row {
    gap: 12px;
  }
  .duty-modal .duty-people-list {
    border: 1px solid #d7dbe3;
    border-radius: 8px;
    max-height: 360px;
    padding: 4px 0;
  }
  .duty-modal .duty-person-row {
    min-height: 34px;
    padding: 5px 12px;
    font-size: 13px;
    line-height: 20px;
    color: #4f5560;
  }
  .duty-modal .duty-person-row input {
    width: 16px;
    height: 16px;
    accent-color: #6ea8ff;
  }
  .duty-modal .modal-footer {
    gap: 12px;
  }
  .duty-modal .btn,
  .duty-modal .btn.btn-brand {
    min-height: 40px;
    padding: 0 22px;
    font-size: 14px;
    font-weight: 700;
  }
  .duty-modal .btn {
    background: #f4fbff;
    border-color: #cfe7fb;
    color: #4d8fcb;
  }
  .duty-modal .btn:hover {
    background: #ecf7ff;
  }
  .today-count {
    height: 27px;
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    color: #68707b;
    white-space: nowrap;
  }
  .today-count strong { color: #445062; }

  .dropdown-panel {
    min-width: 220px;
    border-radius: 2px;
    padding: 6px;
  }
  .dropdown-item {
    font-size: 12px;
    padding: 6px 8px;
  }
  .dropdown-item.is-group {
    padding-left: 26px;
    font-size: 11px;
  }
</style>
</head>
<body>

<div class="app-shell">
  <aside class="app-rail" aria-hidden="true">
    <div class="rail-burger"><span></span></div>
    <div class="rail-dot"></div>
    <div class="rail-dot is-active"></div>
    <div class="rail-dot"></div>
    <div class="rail-dot"></div>
    <div class="rail-dot"></div>
    <div class="rail-dot"></div>
    <div class="rail-dot"></div>

<script src="data.js"></script>
<script src="common.js"></script>
<script>
(function () {
  "use strict";

  var peopleById = {};
  DATA.people.forEach(function (p) { peopleById[p.id] = p; });
  var departmentsById = {};
  DATA.departments.forEach(function (d) { departmentsById[d.id] = d; });

  var todayIdx = DATA.sprints.findIndex(function (s) { return s.current; });
  var defaultPairStart = todayIdx > 0 ? todayIdx - 1 : todayIdx;
  var MONTHS_SHORT_UP = ["Янв", "Фев", "Мар", "Апр", "Май", "Июн", "Июл", "Авг", "Сен", "Окт", "Ноя", "Дек"];

  var lastRenderContext = null;

  var state = {
    shift: "all",
    hiddenDepts: new Set(),
    hiddenGroups: new Set(),   // ключи "deptId::groupId"
    expanded: new Set(["support::humo"]), // ключи продуктов (deptId или deptId::groupId)
    zoom: "sprints",
    sprintPairStart: defaultPairStart,
    quarterAnchor: quarterStartOf(Roster.fromISO(DATA.today)),
    yearAnchor: Roster.fromISO(DATA.today).getFullYear()
  };

  function groupKey(deptId, groupId) { return deptId + "::" + groupId; }
  function quarterStartOf(d) {
    var q = Math.floor(d.getMonth() / 3);
    return new Date(d.getFullYear(), q * 3, 1);
  }
  function mondayOnOrBefore(d) {
    var r = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    var wd = r.getDay();
    var diff = wd === 0 ? 6 : wd - 1;
    r.setDate(r.getDate() - diff);
    return r;
  }

  function visibleDepartments() {
    return DATA.departments
      .filter(function (d) { return !state.hiddenDepts.has(d.id); })
      .map(function (d) {
        if (!d.groups) return d;
        var groups = d.groups.filter(function (g) { return !state.hiddenGroups.has(groupKey(d.id, g.id)); });
        return groups.length === d.groups.length ? d : Object.assign({}, d, { groups: groups });
      })
      .filter(function (d) { return !d.groups || d.groups.length > 0; });
  }

  function buildRows(visibleDepts) {
    var rows = [];
    visibleDepts.forEach(function (d) {
      if (d.groups && d.groups.length) {
        rows.push({ type: "cluster", name: d.name });
        d.groups.forEach(function (g) {
          rows.push({ type: "product", deptId: d.id, groupId: g.id, name: g.name, key: groupKey(d.id, g.id), nested: true });
        });
      } else {
        rows.push({ type: "product", deptId: d.id, groupId: null, name: d.name, key: d.id, nested: false });
      }
    });
    return rows;
  }

  /**
   * Склейка duties в спаны ТОЛЬКО по смене человека: подряд идущие дни
   * одного человека одной смены — одна плашка, независимо от границ
   * спринтов и от того, менялся ли внутри флаг lead (в отличие от
   * Roster.buildSpans, который режет и по спринтам, и по lead). Новая
   * плашка появляется только при разрыве в датах — т.е. когда человека
   * реально сменили. lead итоговой плашки = большинство её дней.
   */
  function buildMergedSpans(duties) {
    var groups = {};
    duties.forEach(function (d) {
      var k = d.personId + "|" + d.shift;
      (groups[k] || (groups[k] = [])).push(d);
    });
    var spans = [];
    Object.keys(groups).forEach(function (k) {
      var arr = groups[k];
      var personId = arr[0].personId, shift = arr[0].shift;
      var p = peopleById[personId];
      if (!p) return;
      var byDate = {};
      arr.forEach(function (d) { if (d.lead) byDate[d.date] = true; else if (!(d.date in byDate)) byDate[d.date] = false; });
      var dates = Object.keys(byDate).sort();
      if (!dates.length) return;
      var start = dates[0], prev = dates[0];
      var total = 1, leadDays = byDate[dates[0]] ? 1 : 0;
      function push(endDate) {
        spans.push({
          personId: personId, departmentId: p.departmentId, groupId: p.groupId || null,
          shift: shift, lead: leadDays > total / 2, start: start, end: endDate
        });
      }
      for (var i = 1; i < dates.length; i++) {
        if (Roster.diffDaysISO(dates[i], prev) > 1) {
          push(prev);
          start = dates[i]; total = 0; leadDays = 0;
        }
        prev = dates[i];
        total++;
        if (byDate[dates[i]]) leadDays++;
      }
      push(prev);
    });
    return spans;
  }

  // ---------------------------------------------------------- controls --

  var shiftTabs = document.getElementById("shiftTabs");
  var viewSelect = document.getElementById("viewSelect");
  shiftTabs.addEventListener("click", function (e) {
    var btn = e.target.closest(".tab-btn");
    if (!btn) return;
    shiftTabs.querySelectorAll(".tab-btn").forEach(function (b) { b.setAttribute("aria-selected", b === btn ? "true" : "false"); });
    state.shift = btn.dataset.shift;
    render();
  });
  viewSelect.addEventListener("change", function () {
    state.zoom = viewSelect.value;
    render();
  });

  var deptDropdown = document.getElementById("deptDropdown");
  var deptDropdownBtn = document.getElementById("deptDropdownBtn");
  var deptDropdownPanel = document.getElementById("deptDropdownPanel");
  var productDropdown = document.getElementById("productDropdown");
  var productDropdownBtn = document.getElementById("productDropdownBtn");
  var productDropdownPanel = document.getElementById("productDropdownPanel");
  DATA.departments.forEach(function (d) {
    var row = document.createElement("label");
    row.className = "dropdown-item";
    row.innerHTML = '<input type="checkbox" checked data-dept="' + d.id + '"> ' + Roster.escapeHtml(d.name);
    deptDropdownPanel.appendChild(row);
    if (!d.groups) {
      var productOnlyRow = document.createElement("label");
      productOnlyRow.className = "dropdown-item";
      productOnlyRow.innerHTML = '<input type="checkbox" checked data-product-dept="' + d.id + '"> ' + Roster.escapeHtml(d.name);
      productDropdownPanel.appendChild(productOnlyRow);
      return;
    }
    d.groups.forEach(function (g) {
      var groupRow = document.createElement("label");
      groupRow.className = "dropdown-item is-group";
      groupRow.innerHTML = '<input type="checkbox" checked data-dept="' + d.id + '" data-group="' + g.id + '"> ' + Roster.escapeHtml(g.name);
      deptDropdownPanel.appendChild(groupRow);

      var productRow = document.createElement("label");
      productRow.className = "dropdown-item";
      productRow.innerHTML = '<input type="checkbox" checked data-product-dept="' + d.id + '" data-product-group="' + g.id + '"> ' + Roster.escapeHtml(g.name);
      productDropdownPanel.appendChild(productRow);
    });
  });
  deptDropdownBtn.addEventListener("click", function () {
    var open = deptDropdown.classList.toggle("open");
    deptDropdownBtn.setAttribute("aria-expanded", open ? "true" : "false");
    if (open) {
      productDropdown.classList.remove("open");
      productDropdownBtn.setAttribute("aria-expanded", "false");
    }
  });
  productDropdownBtn.addEventListener("click", function () {
    var open = productDropdown.classList.toggle("open");
    productDropdownBtn.setAttribute("aria-expanded", open ? "true" : "false");
    if (open) {
      deptDropdown.classList.remove("open");
      deptDropdownBtn.setAttribute("aria-expanded", "false");
    }
  });
  document.addEventListener("click", function (e) {
    if (!deptDropdown.contains(e.target)) { deptDropdown.classList.remove("open"); deptDropdownBtn.setAttribute("aria-expanded", "false"); }
    if (!productDropdown.contains(e.target)) { productDropdown.classList.remove("open"); productDropdownBtn.setAttribute("aria-expanded", "false"); }
  });
  deptDropdownPanel.addEventListener("change", function (e) {
    var cb = e.target;
    if (!cb.dataset.dept) return;
    if (cb.dataset.group) {
      var key = groupKey(cb.dataset.dept, cb.dataset.group);
      if (cb.checked) state.hiddenGroups.delete(key); else state.hiddenGroups.add(key);
    } else {
      if (cb.checked) state.hiddenDepts.delete(cb.dataset.dept); else state.hiddenDepts.add(cb.dataset.dept);
      deptDropdownPanel.querySelectorAll('input[data-group][data-dept="' + cb.dataset.dept + '"]').forEach(function (groupCb) {
        groupCb.disabled = !cb.checked;
        groupCb.closest(".dropdown-item").classList.toggle("is-disabled", !cb.checked);
      });
    }
    render();
  });
  productDropdownPanel.addEventListener("change", function (e) {
    var cb = e.target;
    if (!cb.dataset.productDept) return;
    var deptId = cb.dataset.productDept;
    var groupId = cb.dataset.productGroup || null;
    if (groupId) {
      var gKey = groupKey(deptId, groupId);
      if (cb.checked) state.hiddenGroups.delete(gKey); else state.hiddenGroups.add(gKey);
    } else {
      if (cb.checked) state.hiddenDepts.delete(deptId); else state.hiddenDepts.add(deptId);
    }
    render();
  });

  document.getElementById("prevBtn").addEventListener("click", function () { shiftPeriod(-1); });
  document.getElementById("nextBtn").addEventListener("click", function () { shiftPeriod(1); });
  document.getElementById("todayBtn").addEventListener("click", function () {
    state.sprintPairStart = defaultPairStart;
    state.quarterAnchor = quarterStartOf(Roster.fromISO(DATA.today));
    state.yearAnchor = Roster.fromISO(DATA.today).getFullYear();
    render();
    scrollToTodayColumn();
  });

  var expandAllBtn = document.getElementById("expandAllBtn");
  expandAllBtn.addEventListener("click", function () {
    var rows = buildRows(visibleDepartments()).filter(function (r) { return r.type === "product"; });
    var allExpanded = rows.every(function (r) { return state.expanded.has(r.key); });
    if (allExpanded) rows.forEach(function (r) { state.expanded.delete(r.key); });
    else rows.forEach(function (r) { state.expanded.add(r.key); });
    render();
  });

  function shiftPeriod(dir) {
    if (state.zoom === "sprints") {
      var next = state.sprintPairStart + dir;
      state.sprintPairStart = Math.max(0, Math.min(DATA.sprints.length - 2, next));
    } else if (state.zoom === "quarter") {
      state.quarterAnchor = new Date(state.quarterAnchor.getFullYear(), state.quarterAnchor.getMonth() + dir * 3, 1);
    } else {
      state.yearAnchor += dir;
    }
    render();
  }

  function scrollToTodayColumn() {
    var el = document.querySelector('.day-head-cell[data-date="' + DATA.today + '"]');
    if (el) el.scrollIntoView({ inline: "center", block: "nearest" });
  }

  window.addEventListener("resize", render);

  // ------------------------------------------------------------- today --

  function updateTodayCount(filteredDuties) {
    var todayDuties = filteredDuties.filter(function (d) { return d.date === DATA.today; });
    var totalPeople = new Set(todayDuties.map(function (d) { return d.personId; })).size;
    document.getElementById("todayCount").innerHTML = "Сегодня дежурят: <strong>" + totalPeople + "</strong>";
  }

  // -------------------------------------------------------------- main --

  function setColumnsVar(count) {
    var dayW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--day-w-fixed")) || 48.25;
    document.getElementById("tlGrid").style.setProperty("--day-w", dayW + "px");
    return dayW;
  }

  function setAdaptiveColumnsVar(count, minWidth) {
    var wrap = document.getElementById("tlWrap");
    var labelW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--label-col-w")) || 350;
    var available = Math.max(0, wrap.clientWidth - labelW);
    var dayW = Math.max(minWidth, available / count);
    document.getElementById("tlGrid").style.setProperty("--day-w", dayW + "px");
    return dayW;
  }

  function pluralPeopleShort(n) {
    var mod10 = n % 10, mod100 = n % 100;
    if (mod10 === 1 && mod100 !== 11) return "человек";
    if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return "человека";
    return "человек";
  }

  function pluralEmployees(n) {
    var mod10 = n % 10, mod100 = n % 100;
    if (mod10 === 1 && mod100 !== 11) return "сотрудник";
    if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return "сотрудника";
    return "сотрудников";
  }

  // "ПН" -> "Пн" (формат дня в шапке как в проде: "6 - Пн")
  function weekdayTitle(iso) {
    var w = Roster.weekdayLetter(iso);
    return w.charAt(0) + w.charAt(1).toLowerCase();
  }

  function mergedSpansForRow(filteredDuties, row, windowStart, windowEnd) {
    return buildMergedSpans(filteredDuties).filter(function (span) {
      if (span.end < windowStart || span.start > windowEnd) return false;
      if (span.departmentId !== row.deptId) return false;
      if (row.groupId) return span.groupId === row.groupId;
      return !span.groupId;
    });
  }

  function render() {
    if (viewSelect.value !== state.zoom) viewSelect.value = state.zoom;
    if (state.zoom === "sprints") renderSprints();
    else if (state.zoom === "quarter") renderQuarter();
    else renderYear();
  }

  function renderSprints() {
    var visibleDepts = visibleDepartments();
    var allProductRows = buildRows(DATA.departments).filter(function (r) { return r.type === "product"; });
    var visibleProductRows = buildRows(visibleDepts).filter(function (r) { return r.type === "product"; });
    var hiddenCount = (DATA.departments.length - visibleDepts.length) + state.hiddenGroups.size;
    document.getElementById("deptFilterCount").textContent = hiddenCount > 0 ? String(hiddenCount) : "";
    document.getElementById("deptFilterLabel").textContent =
      visibleDepts.length === DATA.departments.length ? "Все" :
      (visibleDepts.length === 1 ? visibleDepts[0].name : visibleDepts.length + " выбрано");
    document.getElementById("productFilterCount").textContent =
      visibleProductRows.length === allProductRows.length ? "" : String(visibleProductRows.length);
    document.getElementById("productFilterLabel").textContent =
      visibleProductRows.length === allProductRows.length ? "Все" :
      (visibleProductRows.length === 1 ? visibleProductRows[0].name : visibleProductRows.length + " выбрано");

    var filteredDuties = state.shift === "all" ? DATA.duties : DATA.duties.filter(function (d) { return d.shift === state.shift; });
    filteredDuties = filteredDuties.filter(function (d) {
      var p = peopleById[d.personId];
      if (!p) return false;
      if (state.hiddenDepts.has(p.departmentId)) return false;
      if (p.groupId && state.hiddenGroups.has(groupKey(p.departmentId, p.groupId))) return false;
      return true;
    });
    updateTodayCount(filteredDuties);
    lastRenderContext = { visibleDepts: visibleDepts, filteredDuties: filteredDuties, peopleById: peopleById };

    var pairStart = Math.max(0, Math.min(DATA.sprints.length - 2, state.sprintPairStart));
    var sprintA = DATA.sprints[pairStart];
    var sprintB = DATA.sprints[pairStart + 1];
    document.getElementById("periodLabel").textContent = sprintA.id + " – " + sprintB.id;
    document.getElementById("prevBtn").disabled = pairStart <= 0;
    document.getElementById("nextBtn").disabled = pairStart >= DATA.sprints.length - 2;

    var days = [];
    [sprintA, sprintB].forEach(function (sprint) {
      for (var iso = sprint.start; iso <= sprint.end; iso = Roster.addDays(iso, 1)) days.push(iso);
    });
    var windowStart = days[0], windowEnd = days[days.length - 1];
    var dayW = setColumnsVar(days.length);
    var dayIndex = {};
    days.forEach(function (iso, i) { dayIndex[iso] = i; });

    // Счётчик дежурных на день для каждой колонки-продукта
    var countIndex = {};
    filteredDuties.forEach(function (d) {
      if (d.date < windowStart || d.date > windowEnd) return;
      var p = peopleById[d.personId];
      var key = p.departmentId + "|" + (p.groupId || "") + "|" + d.date;
      (countIndex[key] || (countIndex[key] = new Set())).add(p.id);
    });
    function countFor(deptId, groupId, iso) {
      var set = countIndex[deptId + "|" + (groupId || "") + "|" + iso];
      return set ? set.size : 0;
    }

    var gridRows = buildRows(visibleDepts);

    // Раскладка строк: у кластера и у свёрнутого продукта — 1 строка.
    // У развёрнутого продукта — 1 строка-заголовок и затем по одной строке
    // на каждого человека, который виден в текущем окне двух спринтов.
    var HEADER_ROW_H = 22, LANE_ROW_H = 44, CLUSTER_ROW_H = 22;
    var rowMeta = [];
    var rowCursor = 3;
    gridRows.forEach(function (gr) {
      if (gr.type === "cluster") {
        rowMeta.push({ row: gr, gridRowStart: rowCursor, footprint: 1 });
        rowCursor += 1;
        return;
      }
      var isExpanded = state.expanded.has(gr.key);
      var windowPeople = Roster.peopleInRange(filteredDuties, peopleById, gr.deptId, windowStart, windowEnd, gr.groupId);
      var personIds = new Set(windowPeople.map(function (person) { return person.id; }));
      var personSpans = mergedSpansForRow(filteredDuties, gr, windowStart, windowEnd).filter(function (span) {
        return personIds.has(span.personId);
      });
      var footprint = 1 + (isExpanded ? windowPeople.length : 0);
      rowMeta.push({
        row: gr,
        gridRowStart: rowCursor,
        footprint: footprint,
        isExpanded: isExpanded,
        windowPeople: windowPeople,
        personSpans: personSpans
      });
      rowCursor += footprint;
    });

    var grid = document.getElementById("tlGrid");
    grid.innerHTML = "";
    grid.style.gridTemplateColumns = "var(--label-col-w) repeat(" + days.length + ", var(--day-w))";
    grid.style.gridTemplateRows = "20px 20px " + rowMeta.map(function (m) {
      if (m.row.type === "cluster") return CLUSTER_ROW_H + "px";
      var sizes = [HEADER_ROW_H + "px"];
      for (var k = 0; k < m.footprint - 1; k++) sizes.push(LANE_ROW_H + "px");
      return sizes.join(" ");
    }).join(" ");

    var corner = document.createElement("div");
    corner.className = "corner-cell";
    corner.textContent = "Кластер / продукт";
    grid.appendChild(corner);

    [sprintA, sprintB].forEach(function (sprint, si) {
      var cell = document.createElement("div");
      cell.className = "sprint-head-cell sprint-clickable";
      cell.style.gridColumn = (si * 14 + 2) + " / span 14";
      cell.style.gridRow = "1";
      cell.dataset.sprintId = sprint.id;
      cell.tabIndex = 0;
      cell.setAttribute("role", "button");
      cell.setAttribute("aria-label", "Сводка по спринту " + sprint.id);
      cell.innerHTML = "<span>" + sprint.id + "</span><span style='font-weight:400;color:var(--gray-500)'>" +
        Roster.formatRangeFull(sprint.start, sprint.end) + "</span>" +
        (sprint.current ? '<span class="badge badge-success">Текущий</span>' : "");
      grid.appendChild(cell);
    });

    days.forEach(function (iso, idx) {
      var isToday = iso === DATA.today;
      var isWeekend = Roster.isWeekendISO(iso);
      var cell = document.createElement("div");
      cell.className = "day-head-cell" + (isWeekend ? " is-weekend" : "") + (isToday ? " is-today" : "");
      cell.style.gridColumn = (idx + 2) + "";
      cell.style.gridRow = "2";
      cell.style.top = "20px";
      cell.dataset.date = iso;
      cell.tabIndex = 0;
      cell.setAttribute("role", "button");
      cell.setAttribute("aria-label", "Открыть дежурство на " + Roster.formatRangeFull(iso, iso));
      cell.innerHTML = '<span class="d-num">' + Roster.dayNum(iso) + '</span>&nbsp;-&nbsp;' + weekdayTitle(iso);
      cell.addEventListener("click", function () { openDutyModal({ fromISO: iso, toISO: iso }); });
      cell.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openDutyModal({ fromISO: iso, toISO: iso });
        }
      });
      grid.appendChild(cell);
    });

    // Спаны склеены только по смене человека (см. buildMergedSpans),
    // потом обрезаются по видимому окну — карточка визуально непрерывна,
    // пока дежурит один и тот же человек.
    var mergedSpans = buildMergedSpans(filteredDuties).filter(function (s) {
      return s.end >= windowStart && s.start <= windowEnd;
    });

    function appendColBg(container) {
      days.forEach(function (iso, idx) {
        var bg = document.createElement("div");
        bg.className = "col-bg" + (Roster.isWeekendISO(iso) ? " weekend" : "");
        bg.style.left = (idx * dayW) + "px";
        bg.style.width = dayW + "px";
        container.appendChild(bg);
      });
    }

    function buildBar(span) {
      var person = peopleById[span.personId];
      var clipStart = span.start < windowStart ? windowStart : span.start;
      var clipEnd = span.end > windowEnd ? windowEnd : span.end;
      var s = dayIndex[clipStart], e = dayIndex[clipEnd];

      var el = Roster.renderCard(span, peopleById, departmentsById, { compact: (e - s + 1) < 2 });
      el.style.left = (s * dayW + 2) + "px";
      el.style.width = ((e - s + 1) * dayW - 4) + "px";
      return { el: el, s: s, e: e };
    }

    rowMeta.forEach(function (m) {
      var gr = m.row;

      if (gr.type === "cluster") {
        var section = document.createElement("div");
        section.className = "cluster-row";
        section.style.gridColumn = "1 / -1";
        section.style.gridRow = m.gridRowStart + "";
        section.innerHTML = '<span class="cluster-label"></span>';
        section.firstChild.textContent = gr.name;
        grid.appendChild(section);
        return;
      }

      var isExpanded = m.isExpanded;
      var windowPeople = m.windowPeople;

      var label = document.createElement("div");
      label.className = "product-label" + (gr.nested ? " is-nested" : "");
      label.style.gridColumn = "1";
      label.style.gridRow = m.gridRowStart + "";
      label.tabIndex = 0;
      label.setAttribute("role", "button");
      label.setAttribute("aria-expanded", isExpanded ? "true" : "false");
      label.setAttribute("aria-label", (isExpanded ? "Свернуть " : "Развернуть ") + gr.name);
      label.innerHTML =
        '<svg class="p-chev" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M6 8l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '<span class="p-team" aria-hidden="true"></span>' +
        '<span class="p-name"></span>' +
        '<span class="p-count">' + windowPeople.length + ' ' + pluralEmployees(windowPeople.length) + '</span>';
      label.querySelector(".p-name").textContent = gr.name;
      label.addEventListener("click", function () { toggleProduct(gr.key); });
      label.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleProduct(gr.key); }
      });
      grid.appendChild(label);

      var headerBody = document.createElement("div");
      headerBody.className = "row-header-body";
      headerBody.style.gridColumn = "2 / span " + days.length;
      headerBody.style.gridRow = m.gridRowStart + "";
      headerBody.setAttribute("role", "gridcell");
      appendColBg(headerBody);

      days.forEach(function (iso, idx) {
        var count = countFor(gr.deptId, gr.groupId, iso);
        var cell = document.createElement("div");
        cell.className = "count-cell " + (count === 0 ? "c-zero" : count >= 5 ? "c-many" : "c-some");
        cell.style.left = (idx * dayW + 1) + "px";
        cell.style.width = (dayW - 2) + "px";
        cell.textContent = count === 0 ? "0" : count + " с";
        cell.dataset.tooltip = gr.name + ", " + Roster.formatRangeFull(iso, iso) + ": " +
          (count === 0 ? "никто не назначен" : count + " " + pluralPeopleShort(count) + " на дежурстве");
        cell.tabIndex = 0;
        cell.setAttribute("role", "button");
        cell.setAttribute("aria-label", "Открыть дежурство для " + gr.name + " на " + Roster.formatRangeFull(iso, iso));
        cell.addEventListener("click", function (evt) {
          evt.stopPropagation();
          openDutyModal({ deptId: gr.deptId, groupId: gr.groupId, fromISO: iso, toISO: iso });
        });
        cell.addEventListener("keydown", function (evt) {
          if (evt.key === "Enter" || evt.key === " ") {
            evt.preventDefault();
            evt.stopPropagation();
            openDutyModal({ deptId: gr.deptId, groupId: gr.groupId, fromISO: iso, toISO: iso });
          }
        });
        headerBody.appendChild(cell);
      });
      grid.appendChild(headerBody);

      if (!isExpanded) return;

      m.windowPeople.forEach(function (person, personIndex) {
        var laneGridRow = m.gridRowStart + 1 + personIndex;

        var laneSpacer = document.createElement("div");
        laneSpacer.className = "lane-spacer";
        laneSpacer.style.gridColumn = "1";
        laneSpacer.style.gridRow = laneGridRow + "";
        grid.appendChild(laneSpacer);

        var laneBody = document.createElement("div");
        laneBody.className = "event-lane";
        laneBody.style.gridColumn = "2 / span " + days.length;
        laneBody.style.gridRow = laneGridRow + "";
        laneBody.setAttribute("role", "gridcell");
        appendColBg(laneBody);

        m.personSpans.filter(function (span) { return span.personId === person.id; }).forEach(function (span) {
          var bar = buildBar(span);
          laneBody.appendChild(bar.el);
        });

        laneBody.addEventListener("click", function (evt) {
          var interactive = evt.target.closest(".duty-card");
          if (interactive) return;
          var rect = laneBody.getBoundingClientRect();
          var idx = Math.max(0, Math.min(days.length - 1, Math.floor((evt.clientX - rect.left) / dayW)));
          var iso = days[idx];
          openDutyModal({ deptId: gr.deptId, groupId: gr.groupId, fromISO: iso, toISO: iso });
        });

        grid.appendChild(laneBody);
      });
    });

    // Колонка "сегодня" — оранжевая рамка на всю высоту, как в проде
    deptDropdownPanel.querySelectorAll("input[data-dept]").forEach(function (cb) {
      var deptId = cb.dataset.dept;
      if (cb.dataset.group) {
        cb.checked = !state.hiddenGroups.has(groupKey(deptId, cb.dataset.group));
        cb.disabled = state.hiddenDepts.has(deptId);
        cb.closest(".dropdown-item").classList.toggle("is-disabled", state.hiddenDepts.has(deptId));
      } else {
        cb.checked = !state.hiddenDepts.has(deptId);
      }
    });
    productDropdownPanel.querySelectorAll("input[data-product-dept]").forEach(function (cb) {
      var deptId = cb.dataset.productDept;
      if (state.hiddenDepts.has(deptId)) cb.checked = false;
      else if (cb.dataset.productGroup) cb.checked = !state.hiddenGroups.has(groupKey(deptId, cb.dataset.productGroup));
      else cb.checked = !state.hiddenDepts.has(deptId);
    });

    if (dayIndex[DATA.today] !== undefined) {
      var col = document.createElement("div");
      col.className = "today-col";
      col.style.left = (350 + dayIndex[DATA.today] * dayW) + "px";
      col.style.width = dayW + "px";
      col.style.height = grid.scrollHeight + "px";
      grid.appendChild(col);
    }

    var productRows = gridRows.filter(function (r) { return r.type === "product"; });
    var allExpanded = productRows.length > 0 && productRows.every(function (r) { return state.expanded.has(r.key); });
    expandAllBtn.textContent = allExpanded ? "Свернуть все" : "Развернуть все";

    Roster.wireHighlight(grid);
  }

  function syncFilterLabels(visibleDepts) {
    var allProductRows = buildRows(DATA.departments).filter(function (r) { return r.type === "product"; });
    var visibleProductRows = buildRows(visibleDepts).filter(function (r) { return r.type === "product"; });
    var hiddenCount = (DATA.departments.length - visibleDepts.length) + state.hiddenGroups.size;
    document.getElementById("deptFilterCount").textContent = hiddenCount > 0 ? String(hiddenCount) : "";
    document.getElementById("deptFilterLabel").textContent =
      visibleDepts.length === DATA.departments.length ? "Все" :
      (visibleDepts.length === 1 ? visibleDepts[0].name : visibleDepts.length + " выбрано");
    document.getElementById("productFilterCount").textContent =
      visibleProductRows.length === allProductRows.length ? "" : String(visibleProductRows.length);
    document.getElementById("productFilterLabel").textContent =
      visibleProductRows.length === allProductRows.length ? "Все" :
      (visibleProductRows.length === 1 ? visibleProductRows[0].name : visibleProductRows.length + " выбрано");
  }

  function getFilteredContext() {
    var visibleDepts = visibleDepartments();
    syncFilterLabels(visibleDepts);
    var filteredDuties = state.shift === "all" ? DATA.duties : DATA.duties.filter(function (d) { return d.shift === state.shift; });
    filteredDuties = filteredDuties.filter(function (d) {
      var p = peopleById[d.personId];
      if (!p) return false;
      if (state.hiddenDepts.has(p.departmentId)) return false;
      if (p.groupId && state.hiddenGroups.has(groupKey(p.departmentId, p.groupId))) return false;
      return true;
    });
    updateTodayCount(filteredDuties);
    lastRenderContext = { visibleDepts: visibleDepts, filteredDuties: filteredDuties, peopleById: peopleById };
    return { visibleDepts: visibleDepts, filteredDuties: filteredDuties };
  }

  function renderQuarter() {
    var ctx = getFilteredContext();
    var visibleDepts = ctx.visibleDepts;
    var filteredDuties = ctx.filteredDuties;
    var anchor = state.quarterAnchor;
    var q = Math.floor(anchor.getMonth() / 3) + 1;
    document.getElementById("periodLabel").textContent = anchor.getFullYear() + " · Q" + q;
    document.getElementById("prevBtn").disabled = false;
    document.getElementById("nextBtn").disabled = false;

    var weekStart = mondayOnOrBefore(anchor);
    var weeks = [];
    for (var i = 0; i < 13; i++) {
      var wStart = Roster.addDaysDate(weekStart, i * 7);
      var wEnd = Roster.addDaysDate(wStart, 6);
      weeks.push({ start: Roster.toISO(wStart), end: Roster.toISO(wEnd) });
    }

    var rows = buildRows(visibleDepts);
    var grid = document.getElementById("tlGrid");
    grid.innerHTML = "";
    setAdaptiveColumnsVar(weeks.length, 96);
    grid.style.gridTemplateColumns = "var(--label-col-w) repeat(" + weeks.length + ", var(--day-w))";
    grid.style.gridTemplateRows = "20px 20px repeat(" + rows.length + ", 36px)";

    var corner = document.createElement("div");
    corner.className = "corner-cell";
    corner.textContent = "Кластер / продукт";
    grid.appendChild(corner);

    weeks.forEach(function (w, idx) {
      var sprint = DATA.sprints.find(function (s) { return w.start >= s.start && w.start <= s.end; });
      var cell = document.createElement("div");
      cell.className = "sprint-head-cell" + (sprint ? " sprint-clickable" : "");
      cell.style.gridColumn = (idx + 2) + "";
      cell.style.gridRow = "1";
      if (sprint) {
        cell.dataset.sprintId = sprint.id;
        cell.tabIndex = 0;
        cell.setAttribute("role", "button");
        cell.setAttribute("aria-label", "Сводка по спринту " + sprint.id);
        cell.innerHTML = "<span>" + sprint.id.replace("SPRINT-", "S") + "</span>";
      } else {
        cell.textContent = "—";
      }
      grid.appendChild(cell);
    });

    weeks.forEach(function (w, idx) {
      var isCurrentWeek = DATA.today >= w.start && DATA.today <= w.end;
      var cell = document.createElement("div");
      cell.className = "day-head-cell" + (isCurrentWeek ? " is-today" : "");
      cell.style.gridColumn = (idx + 2) + "";
      cell.style.gridRow = "2";
      cell.style.top = "20px";
      cell.innerHTML = '<span class="d-num">' + Roster.dayNum(w.start) + " " + Roster.monthShort(w.start) + '</span>&nbsp;-&nbsp;<span>' +
        Roster.dayNum(w.end) + " " + Roster.monthShort(w.end) + "</span>";
      grid.appendChild(cell);
    });

    rows.forEach(function (gr, rowIdx) {
      var gridRow = rowIdx + 3;
      if (gr.type === "cluster") {
        var section = document.createElement("div");
        section.className = "cluster-row";
        section.style.gridColumn = "1 / -1";
        section.style.gridRow = gridRow + "";
        section.innerHTML = '<span class="cluster-label"></span>';
        section.firstChild.textContent = gr.name;
        grid.appendChild(section);
        return;
      }

      var label = document.createElement("div");
      label.className = "product-label" + (gr.nested ? " is-nested" : "");
      label.style.gridColumn = "1";
      label.style.gridRow = gridRow + "";
      label.innerHTML = '<span class="p-team" aria-hidden="true"></span><span class="p-name"></span>';
      label.querySelector(".p-name").textContent = gr.name;
      grid.appendChild(label);

      weeks.forEach(function (w, idx) {
        var cell = document.createElement("div");
        cell.className = "agg-cell";
        cell.style.gridColumn = (idx + 2) + "";
        cell.style.gridRow = gridRow + "";
        cell.style.height = "36px";
        cell.style.padding = "4px 8px";
        var people = Roster.peopleInRange(filteredDuties, peopleById, gr.deptId, w.start, w.end, gr.groupId);
        if (!people.length) {
          cell.innerHTML = '<span class="empty-dash">—</span>';
        } else {
          var shown = people.slice(0, 3);
          var html = '<span class="avatar-stack">' + shown.map(function (p) {
            var partial = p.weekDays < 7 ? p.weekDays : null;
            return Roster.avatarHtml(p, "avatar-sm", ' data-person-id="' + p.id + '"', p.isLead, partial);
          }).join("") + '</span>';
          if (people.length > 3) html += '<span class="agg-more">+' + (people.length - 3) + '</span>';
          cell.innerHTML = html;
          cell.dataset.tooltip = people.map(function (p) { return p.fullName + " (" + p.weekDays + " дн.)"; }).join(", ");
        }
        grid.appendChild(cell);
      });
    });

    Roster.wireHighlight(grid);
  }

  function renderYear() {
    var ctx = getFilteredContext();
    var visibleDepts = ctx.visibleDepts;
    var filteredDuties = ctx.filteredDuties;
    var year = state.yearAnchor;
    document.getElementById("periodLabel").textContent = String(year);
    document.getElementById("prevBtn").disabled = false;
    document.getElementById("nextBtn").disabled = false;

    var rows = buildRows(visibleDepts);
    var grid = document.getElementById("tlGrid");
    grid.innerHTML = "";
    setAdaptiveColumnsVar(12, 112);
    grid.style.gridTemplateColumns = "var(--label-col-w) repeat(12, var(--day-w))";
    grid.style.gridTemplateRows = "20px 20px repeat(" + rows.length + ", 36px)";

    var corner = document.createElement("div");
    corner.className = "corner-cell";
    corner.textContent = "Кластер / продукт";
    grid.appendChild(corner);

    var yCell = document.createElement("div");
    yCell.className = "sprint-head-cell";
    yCell.style.gridColumn = "2 / span 12";
    yCell.style.gridRow = "1";
    yCell.textContent = year + " год";
    grid.appendChild(yCell);

    var todayDate = Roster.fromISO(DATA.today);
    for (var m = 0; m < 12; m++) {
      var isCurrentMonth = todayDate.getFullYear() === year && todayDate.getMonth() === m;
      var h = document.createElement("div");
      h.className = "day-head-cell" + (isCurrentMonth ? " is-today" : "");
      h.style.gridColumn = (m + 2) + "";
      h.style.gridRow = "2";
      h.style.top = "20px";
      h.innerHTML = '<span class="d-num">' + MONTHS_SHORT_UP[m] + "</span>";
      grid.appendChild(h);
    }

    rows.forEach(function (gr, rowIdx) {
      var gridRow = rowIdx + 3;
      if (gr.type === "cluster") {
        var section = document.createElement("div");
        section.className = "cluster-row";
        section.style.gridColumn = "1 / -1";
        section.style.gridRow = gridRow + "";
        section.innerHTML = '<span class="cluster-label"></span>';
        section.firstChild.textContent = gr.name;
        grid.appendChild(section);
        return;
      }

      var label = document.createElement("div");
      label.className = "product-label" + (gr.nested ? " is-nested" : "");
      label.style.gridColumn = "1";
      label.style.gridRow = gridRow + "";
      label.innerHTML = '<span class="p-team" aria-hidden="true"></span><span class="p-name"></span>';
      label.querySelector(".p-name").textContent = gr.name;
      grid.appendChild(label);

      for (var m = 0; m < 12; m++) {
        var mm = String(m + 1).padStart(2, "0");
        var monthStart = year + "-" + mm + "-01";
        var monthEnd = year + "-" + mm + "-" + String(new Date(year, m + 1, 0).getDate()).padStart(2, "0");
        var cell = document.createElement("div");
        cell.className = "agg-cell clickable";
        cell.style.gridColumn = (m + 2) + "";
        cell.style.gridRow = gridRow + "";
        cell.style.height = "36px";
        cell.style.padding = "4px 8px";

        var people = Roster.peopleInRange(filteredDuties, peopleById, gr.deptId, monthStart, monthEnd, gr.groupId);
        if (!people.length) {
          cell.innerHTML = '<span class="empty-dash">—</span>';
        } else {
          var html = '<span class="avatar-stack">' + people.slice(0, 3).map(function (p) {
            return Roster.avatarHtml(p, "avatar-sm", ' data-person-id="' + p.id + '"', p.isLead);
          }).join("") + '</span>';
          if (people.length > 3) html += '<span class="agg-more">+' + (people.length - 3) + '</span>';
          cell.innerHTML = html;
        }
        cell.dataset.tooltip = MONTHS_SHORT_UP[m] + " " + year + ": " + (people.length ? people.map(function (p) { return p.fullName; }).join(", ") : "дежурств нет");
        cell.addEventListener("click", function (monthIndex) {
          return function () { jumpToMonth(year, monthIndex); };
        }(m));
        grid.appendChild(cell);
      }
    });

    Roster.wireHighlight(grid);
  }

  function jumpToMonth(year, month) {
    var midISO = Roster.toISO(new Date(year, month, 15));
    var idx = DATA.sprints.findIndex(function (s) { return midISO >= s.start && midISO <= s.end; });
    state.sprintPairStart = Math.max(0, Math.min(DATA.sprints.length - 2, idx > 0 ? idx - 1 : Math.max(idx, 0)));
    state.zoom = "sprints";
    viewSelect.value = "sprints";
    render();
  }

  function toggleProduct(key) {
    if (state.expanded.has(key)) state.expanded.delete(key);
    else state.expanded.add(key);
    render();
  }

  // ------------------------------------------------- форма "Дежурство" --

  var dutyOverlay = document.getElementById("dutyModalOverlay");
  var dutyDept = document.getElementById("dutyDept");
  var dutyGroup = document.getElementById("dutyGroup");
  var dutyShift = document.getElementById("dutyShift");
  var dutyFrom = document.getElementById("dutyFrom");
  var dutyTo = document.getElementById("dutyTo");
  var dutySearch = document.getElementById("dutySearch");
  var dutyPeopleList = document.getElementById("dutyPeopleList");
  var dutyFormError = document.getElementById("dutyFormError");
  var dutyLastFocused = null;

  DATA.departments.forEach(function (d) {
    var opt = document.createElement("option");
    opt.value = d.id;
    opt.textContent = d.name;
    dutyDept.appendChild(opt);
  });

  function refreshGroupSelect(preferredGroupId) {
    var dept = departmentsById[dutyDept.value];
    dutyGroup.innerHTML = "";
    if (dept && dept.groups && dept.groups.length) {
      dutyGroup.disabled = false;
      dept.groups.forEach(function (g) {
        var opt = document.createElement("option");
        opt.value = g.id;
        opt.textContent = g.name;
        dutyGroup.appendChild(opt);
      });
      if (preferredGroupId) dutyGroup.value = preferredGroupId;
    } else {
      dutyGroup.disabled = true;
      var opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "— (в кластере нет продуктов)";
      dutyGroup.appendChild(opt);
    }
    refreshPeopleList();
  }

  function candidatePeople() {
    var deptId = dutyDept.value;
    var groupId = dutyGroup.disabled ? null : dutyGroup.value;
    return DATA.people.filter(function (p) {
      if (p.departmentId !== deptId) return false;
      if (groupId && p.groupId !== groupId) return false;
      return true;
    });
  }

  function refreshPeopleList() {
    var query = dutySearch.value.trim().toLowerCase();
    var list = candidatePeople();
    dutySearch.placeholder = "Поиск сотрудника (" + list.length + ")…";
    var checkedIds = new Set(
      Array.from(dutyPeopleList.querySelectorAll("input:checked")).map(function (cb) { return cb.value; })
    );
    dutyPeopleList.innerHTML = "";
    var shown = list.filter(function (p) { return !query || p.fullName.toLowerCase().indexOf(query) !== -1; });
    if (!shown.length) {
      dutyPeopleList.innerHTML = '<div class="duty-people-empty">Никого не найдено</div>';
      return;
    }
    shown.forEach(function (p) {
      var row = document.createElement("label");
      row.className = "duty-person-row";
      var cb = document.createElement("input");
      cb.type = "checkbox";
      cb.value = p.id;
      cb.checked = checkedIds.has(p.id);
      row.appendChild(cb);
      row.appendChild(document.createTextNode(p.fullName));
      dutyPeopleList.appendChild(row);
    });
  }

  dutyDept.addEventListener("change", refreshGroupSelect);
  dutyGroup.addEventListener("change", refreshPeopleList);
  dutySearch.addEventListener("input", refreshPeopleList);

  function openDutyModal(opts) {
    opts = opts || {};
    dutyLastFocused = document.activeElement;
    if (opts.deptId) dutyDept.value = opts.deptId;
    dutyFrom.value = opts.fromISO || DATA.today;
    dutyTo.value = opts.toISO || dutyFrom.value;
    dutySearch.value = "";
    dutyFormError.hidden = true;
    dutyFormError.textContent = "";
    dutyPeopleList.querySelectorAll("input:checked").forEach(function (cb) { cb.checked = false; });
    refreshGroupSelect(opts.groupId || null);
    dutyOverlay.hidden = false;
    dutyDept.focus();
  }
  function closeDutyModal() {
    dutyOverlay.hidden = true;
    if (dutyLastFocused && dutyLastFocused.focus) dutyLastFocused.focus();
  }

  document.getElementById("addDutyBtn").addEventListener("click", function () { openDutyModal({}); });
  document.getElementById("dutyModalClose").addEventListener("click", closeDutyModal);
  document.getElementById("dutyCancelBtn").addEventListener("click", closeDutyModal);
  dutyOverlay.addEventListener("click", function (e) { if (e.target === dutyOverlay) closeDutyModal(); });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && !dutyOverlay.hidden) closeDutyModal();
  });

  document.getElementById("dutySaveBtn").addEventListener("click", function () {
    closeDutyModal();
  });

  // ---------------------------------------------------------------- init --

  render();

  Roster.enableTooltips(document.body);
  Roster.initSprintSummaryModal(document.getElementById("tlWrap"), {
    sprints: DATA.sprints,
    getContext: function () { return lastRenderContext; }
  });

  requestAnimationFrame(scrollToTodayColumn);
})();
</script>
</body>
</html>
