<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>График дежурств — Вариант 2 (департаменты × даты)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
<style>
  html, body { height: 100%; overflow: hidden; }
  body { display: flex; flex-direction: column; }

  .tl-wrap {
    flex: 1;
    overflow: auto;
    position: relative;
    background: var(--gray-25);
  }

  .tl-grid {
    display: grid;
    position: relative;
  }

  /* corner + headers */
  .corner-cell {
    position: sticky;
    top: 0; left: 0;
    z-index: 9;
    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    border-right: 1px solid var(--gray-200);
    grid-column: 1;
    grid-row: 1 / span 2;
    display: flex;
    align-items: flex-end;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-500);
  }
  .sprint-head-cell {
    position: sticky;
    top: 0;
    z-index: 6;
    background: var(--gray-50);
    border-bottom: 1px solid var(--gray-200);
    border-left: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-700);
    height: 34px;
    overflow: hidden;
    white-space: nowrap;
  }
  .sprint-head-cell > span { overflow: hidden; text-overflow: ellipsis; }
  .day-head-cell {
    position: sticky;
    z-index: 6;
    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    border-left: 1px solid var(--gray-100);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--gray-500);
    height: 40px;
    line-height: 13px;
  }
  .day-head-cell .dnum { font-size: 13px; font-weight: 600; color: var(--gray-700); }
  .day-head-cell.is-weekend { background: var(--gray-50); }
  .day-head-cell.is-weekend .dnum { color: var(--error-500); }
  .day-head-cell.is-today .dnum {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--brand-600);
    color: #fff;
  }
  .day-head-cell.is-current-period {
    background: var(--brand-25);
  }
  .day-head-cell.is-current-period .dnum {
    color: var(--brand-700);
  }

  .today-line {
    position: absolute;
    top: 0;
    width: 2px;
    background: var(--brand-300);
    z-index: 4;
    pointer-events: none;
  }

  /* department rows */
  .dept-label-cell {
    position: sticky;
    left: 0;
    z-index: 3;
    background: #fff;
    border-right: 1px solid var(--gray-200);
    border-bottom: 1px solid var(--gray-100);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-700);
  }
  /* Строка-названия группы внутри департамента (напр. "Поддержка" -> МПК) —
     чуть светлее и с отступом, сама строка идёт ПОСЛЕ .dept-section-row. */
  .dept-label-cell.is-group {
    padding-left: 24px;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray-600);
  }
  /* Строка-заголовок департамента, у которого есть группы — во всю ширину
     таблицы, сразу над строками его групп (см. Roster.buildColumns). */
  /* Сам бар — на всю ширину грида (не sticky, иначе поедет и разъедется с
     колонками дат под ним при горизонтальном скролле). А вот подпись внутри
     него должна оставаться в поле зрения при скролле — она sticky. */
  .dept-section-row {
    background: var(--gray-50);
    border-bottom: 1px solid var(--gray-200);
    border-top: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-700);
  }
  .dept-section-row .dept-section-label {
    position: sticky;
    left: 0;
    padding: 4px 12px;
  }
  .dept-body-cell {
    position: relative;
    border-bottom: 1px solid var(--gray-100);
    background: #fff;
  }
  .dept-body-cell .col-bg {
    position: absolute;
    top: 0; bottom: 0;
    border-left: 1px solid var(--gray-100);
  }
  .dept-body-cell .col-bg.weekend { background: var(--gray-25); }

  .dept-body-cell .duty-card {
    position: absolute;
    box-sizing: border-box;
    height: 40px;
  }

  .dept-body-cell .empty-dash-abs {
    position: absolute;
    top: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

</style>
</head>
<body>

<header class="page-header">
  <div class="page-title-block">
    <h1 class="page-title">График дежурств</h1>
    <span class="badge badge-gray">Вариант 2 · департаменты × даты</span>
  </div>
</header>

<nav class="tabs" role="tablist" aria-label="Фильтр по типу смены" id="shiftTabs">
  <button class="tab-btn" role="tab" aria-selected="true" data-shift="all">Все</button>
  <button class="tab-btn" role="tab" aria-selected="false" data-shift="day">Дневное</button>
  <button class="tab-btn" role="tab" aria-selected="false" data-shift="night">Ночное</button>
  <button class="tab-btn" role="tab" aria-selected="false" data-shift="weekend">Выходные</button>
</nav>

<div class="filters-bar">
  <div class="filters-left">
    <div class="btn-group" role="group" aria-label="Масштаб" id="zoomGroup">
      <button class="btn" aria-pressed="true" data-zoom="sprint2">2 спринта</button>
      <button class="btn" aria-pressed="false" data-zoom="quarter">Квартал</button>
      <button class="btn" aria-pressed="false" data-zoom="year">Год</button>
    </div>
    <button class="icon-btn" id="prevBtn" aria-label="Предыдущий период">←</button>
    <span class="period-label" id="periodLabel"></span>
    <button class="icon-btn" id="nextBtn" aria-label="Следующий период">→</button>
    <button class="btn" id="todayBtn">Сегодня</button>
    <span class="today-count" id="todayCount">Сегодня дежурят: <strong>0</strong></span>
  </div>
  <div class="filters-right">
    <div class="dropdown" id="deptDropdown">
      <button class="btn" id="deptDropdownBtn" aria-haspopup="true" aria-expanded="false">Департаменты <span id="deptFilterCount"></span></button>
      <div class="dropdown-panel" id="deptDropdownPanel"></div>
    </div>
  </div>
</div>

<main class="tl-wrap" id="tlWrap">
  <div class="tl-grid" id="tlGrid" role="grid" aria-label="График дежурств по департаментам и датам"></div>
</main>

<div class="modal-overlay" id="summaryModalOverlay" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="summaryModalTitle">
    <div class="modal-header">
      <h2 class="modal-title" id="summaryModalTitle">Сводка по спринту</h2>
      <button type="button" class="modal-close" id="summaryModalClose" aria-label="Закрыть">✕</button>
    </div>
    <div class="modal-body" id="summaryModalBody"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="common.js"></script>
<script>
(function () {
  "use strict";

  var peopleById = {};
  DATA.people.forEach(function (p) { peopleById[p.id] = p; });
  var departmentsById = {};
  DATA.departments.forEach(function (d) { departmentsById[d.id] = d; });

  var todayIdx = DATA.sprints.findIndex(function (s) { return s.current; });
  var defaultPairStart = todayIdx > 0 ? todayIdx - 1 : todayIdx;

  var lastRenderContext = null;

  var state = {
    shift: "all",
    hiddenDepts: new Set(),
    hiddenGroups: new Set(),                                  // ключи "deptId::groupId"
    zoom: "sprint2",
    sprintPairStart: defaultPairStart,   // index into DATA.sprints for sprint2 mode
    quarterAnchor: quarterStartOf(Roster.fromISO(DATA.today)),
    yearAnchor: Roster.fromISO(DATA.today).getFullYear()
  };

  function groupKey(deptId, groupId) { return deptId + "::" + groupId; }

  /**
   * Департаменты, видимые с учётом обоих уровней фильтра: скрытые целиком
   * департаменты выброшены; у оставшихся departments со groups скрытые
   * группы вырезаны из .groups (департамент с 0 видимых групп тоже
   * выбрасывается).
   */
  function visibleDepartments() {
    return DATA.departments
      .filter(function (d) { return !state.hiddenDepts.has(d.id); })
      .map(function (d) {
        if (!d.groups) return d;
        var groups = d.groups.filter(function (g) { return !state.hiddenGroups.has(groupKey(d.id, g.id)); });
        return groups.length === d.groups.length ? d : Object.assign({}, d, { groups: groups });
      })
      .filter(function (d) { return !d.groups || d.groups.length > 0; });
  }

  function quarterStartOf(d) {
    var q = Math.floor(d.getMonth() / 3);
    return new Date(d.getFullYear(), q * 3, 1);
  }
  function mondayOnOrBefore(d) {
    var r = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    var wd = r.getDay(); // 0=Sun..6=Sat
    var diff = (wd === 0) ? 6 : wd - 1;
    r.setDate(r.getDate() - diff);
    return r;
  }

  // ---------------------------------------------------------- controls --

  var shiftTabs = document.getElementById("shiftTabs");
  shiftTabs.addEventListener("click", function (e) {
    var btn = e.target.closest(".tab-btn");
    if (!btn) return;
    shiftTabs.querySelectorAll(".tab-btn").forEach(function (b) { b.setAttribute("aria-selected", b === btn ? "true" : "false"); });
    state.shift = btn.dataset.shift;
    render();
  });

  var deptDropdown = document.getElementById("deptDropdown");
  var deptDropdownBtn = document.getElementById("deptDropdownBtn");
  var deptDropdownPanel = document.getElementById("deptDropdownPanel");
  DATA.departments.forEach(function (d) {
    var row = document.createElement("label");
    row.className = "dropdown-item";
    row.innerHTML = '<input type="checkbox" checked data-dept="' + d.id + '"> ' + Roster.escapeHtml(d.name);
    deptDropdownPanel.appendChild(row);
    if (!d.groups) return;
    d.groups.forEach(function (g) {
      var groupRow = document.createElement("label");
      groupRow.className = "dropdown-item is-group";
      groupRow.innerHTML = '<input type="checkbox" checked data-dept="' + d.id + '" data-group="' + g.id + '"> ' + Roster.escapeHtml(g.name);
      deptDropdownPanel.appendChild(groupRow);
    });
  });
  deptDropdownBtn.addEventListener("click", function () {
    var open = deptDropdown.classList.toggle("open");
    deptDropdownBtn.setAttribute("aria-expanded", open ? "true" : "false");
  });
  document.addEventListener("click", function (e) {
    if (!deptDropdown.contains(e.target)) { deptDropdown.classList.remove("open"); deptDropdownBtn.setAttribute("aria-expanded", "false"); }
  });
  deptDropdownPanel.addEventListener("change", function (e) {
    var cb = e.target;
    if (!cb.dataset.dept) return;
    if (cb.dataset.group) {
      var key = groupKey(cb.dataset.dept, cb.dataset.group);
      if (cb.checked) state.hiddenGroups.delete(key); else state.hiddenGroups.add(key);
    } else {
      if (cb.checked) state.hiddenDepts.delete(cb.dataset.dept); else state.hiddenDepts.add(cb.dataset.dept);
      deptDropdownPanel.querySelectorAll('input[data-group][data-dept="' + cb.dataset.dept + '"]').forEach(function (groupCb) {
        groupCb.disabled = !cb.checked;
        groupCb.closest(".dropdown-item").classList.toggle("is-disabled", !cb.checked);
      });
    }
    render();
  });

  var zoomGroup = document.getElementById("zoomGroup");
  zoomGroup.addEventListener("click", function (e) {
    var btn = e.target.closest(".btn");
    if (!btn) return;
    zoomGroup.querySelectorAll(".btn").forEach(function (b) { b.setAttribute("aria-pressed", b === btn ? "true" : "false"); });
    state.zoom = btn.dataset.zoom;
    render();
  });
  zoomGroup.addEventListener("keydown", function (e) {
    if (e.key !== "ArrowLeft" && e.key !== "ArrowRight") return;
    var buttons = Array.prototype.slice.call(zoomGroup.querySelectorAll(".btn"));
    var idx = buttons.indexOf(document.activeElement);
    if (idx === -1) return;
    var next = e.key === "ArrowRight" ? Math.min(buttons.length - 1, idx + 1) : Math.max(0, idx - 1);
    buttons[next].focus();
    buttons[next].click();
    e.preventDefault();
  });

  document.getElementById("prevBtn").addEventListener("click", function () { shiftPeriod(-1); });
  document.getElementById("nextBtn").addEventListener("click", function () { shiftPeriod(1); });
  document.getElementById("todayBtn").addEventListener("click", function () {
    state.sprintPairStart = defaultPairStart;
    state.quarterAnchor = quarterStartOf(Roster.fromISO(DATA.today));
    state.yearAnchor = Roster.fromISO(DATA.today).getFullYear();
    render();
  });

  function shiftPeriod(dir) {
    if (state.zoom === "sprint2") {
      // Скользящее окно на 1 спринт за раз: 14-15 -> след. -> 15-16 -> 16-17,
      // а не перескок сразу через пару (14-15 -> 16-17).
      var next = state.sprintPairStart + dir;
      state.sprintPairStart = Math.max(0, Math.min(DATA.sprints.length - 2, next));
    } else if (state.zoom === "quarter") {
      var d = new Date(state.quarterAnchor.getFullYear(), state.quarterAnchor.getMonth() + dir * 3, 1);
      state.quarterAnchor = d;
    } else {
      state.yearAnchor += dir;
    }
    render();
  }

  window.addEventListener("resize", render);

  // ------------------------------------------------------------- today --

  function updateTodayCount(filteredDuties) {
    var todayDuties = filteredDuties.filter(function (d) { return d.date === DATA.today; });
    var totalPeople = new Set(todayDuties.map(function (d) { return d.personId; })).size;
    document.getElementById("todayCount").innerHTML = "Сегодня дежурят: <strong>" + totalPeople + "</strong>";
  }

  // -------------------------------------------------------------- main --

  function render() {
    var visibleDepts = visibleDepartments();
    var hiddenCount = (DATA.departments.length - visibleDepts.length) + state.hiddenGroups.size;
    document.getElementById("deptFilterCount").textContent = hiddenCount > 0 ? "(" + hiddenCount + ")" : "";

    var filteredDuties = state.shift === "all" ? DATA.duties : DATA.duties.filter(function (d) { return d.shift === state.shift; });
    // Ещё раз фильтруем по скрытым департаментам/группам — чтобы сводка по
    // спринту (модалка) тоже не учитывала скрытых людей, не только строки.
    filteredDuties = filteredDuties.filter(function (d) {
      var p = peopleById[d.personId];
      if (!p) return false;
      if (state.hiddenDepts.has(p.departmentId)) return false;
      if (p.groupId && state.hiddenGroups.has(groupKey(p.departmentId, p.groupId))) return false;
      return true;
    });
    updateTodayCount(filteredDuties);
    // Сохраняем последний контекст фильтров — модалка сводки по спринту
    // открывается по клику независимо от render() и должна видеть текущие
    // фильтры (по табу смены / по чекбоксам департаментов).
    lastRenderContext = { visibleDepts: visibleDepts, filteredDuties: filteredDuties, peopleById: peopleById };


    if (state.zoom === "sprint2") renderSprint2(visibleDepts, filteredDuties);
    else if (state.zoom === "quarter") renderQuarter(visibleDepts, filteredDuties);
    else renderYear(visibleDepts, filteredDuties);
  }

  /**
   * Разворачивает департаменты в плоский список СТРОК грида: департамент
   * без groups — 1 обычная строка; департамент с groups (напр. "Поддержка")
   * — строка-разделитель на всю ширину (dept-header) + по одной строке на
   * каждую группу. dept-header НЕ строка данных, лейнов/duty-card в ней нет.
   */
  function buildGridRows(visibleDepts) {
    var cols = Roster.buildColumns(visibleDepts);
    var gridRows = [];
    var lastDeptStart = null;
    cols.forEach(function (col) {
      if (col.isGrouped && col.deptColStart !== lastDeptStart) {
        gridRows.push({ type: "dept-header", deptName: col.deptName });
        lastDeptStart = col.deptColStart;
      }
      gridRows.push({ type: "row", col: col });
    });
    return gridRows;
  }

  function columnLabel(col) {
    return col.isGrouped ? col.deptName + " / " + col.groupName : col.deptName;
  }

  function setColumnsVar(count) {
    var containerWidth = document.getElementById("tlWrap").clientWidth;
    var dayW = Math.max(40, Math.floor((containerWidth - 240) / count));
    document.getElementById("tlGrid").style.setProperty("--day-w", dayW + "px");
    return dayW;
  }

  // ============================================================ sprint2 =

  function renderSprint2(visibleDepts, filteredDuties) {
    var pairStart = Math.max(0, Math.min(DATA.sprints.length - 2, state.sprintPairStart));
    var sprintA = DATA.sprints[pairStart];
    var sprintB = DATA.sprints[pairStart + 1];
    document.getElementById("periodLabel").textContent = sprintA.id + " – " + sprintB.id;
    document.getElementById("prevBtn").disabled = pairStart <= 0;
    document.getElementById("nextBtn").disabled = pairStart >= DATA.sprints.length - 2;

    var days = [];
    [sprintA, sprintB].forEach(function (sprint) {
      for (var iso = sprint.start; iso <= sprint.end; iso = Roster.addDays(iso, 1)) days.push(iso);
    });
    var dayW = setColumnsVar(days.length);
    var dayIndex = {};
    days.forEach(function (iso, i) { dayIndex[iso] = i; });

    var gridRows = buildGridRows(visibleDepts);

    var grid = document.getElementById("tlGrid");
    grid.innerHTML = "";
    grid.style.gridTemplateColumns = "240px repeat(" + days.length + ", var(--day-w))";
    grid.style.gridTemplateRows = "34px 40px repeat(" + gridRows.length + ", auto)";

    // corner
    var corner = document.createElement("div");
    corner.className = "corner-cell";
    corner.textContent = "Департамент";
    grid.appendChild(corner);

    // sprint header row
    [sprintA, sprintB].forEach(function (sprint, si) {
      var cell = document.createElement("div");
      cell.className = "sprint-head-cell sprint-clickable";
      cell.style.gridColumn = (si * 14 + 2) + " / span 14";
      cell.style.gridRow = "1";
      cell.dataset.sprintId = sprint.id;
      cell.tabIndex = 0;
      cell.setAttribute("role", "button");
      cell.setAttribute("aria-label", "Сводка по спринту " + sprint.id);
      cell.innerHTML = "<span>" + sprint.id + "</span><span style='font-weight:400;color:var(--gray-500)'>" +
        Roster.formatRangeFull(sprint.start, sprint.end) + "</span>" +
        (sprint.current ? '<span class="badge badge-success">Текущий</span>' : "");
      grid.appendChild(cell);
    });

    // day header row
    days.forEach(function (iso, idx) {
      var isToday = iso === DATA.today;
      var isWeekend = Roster.isWeekendISO(iso);
      var cell = document.createElement("div");
      cell.className = "day-head-cell" + (isWeekend ? " is-weekend" : "") + (isToday ? " is-today" : "");
      cell.style.gridColumn = (idx + 2) + "";
      cell.style.gridRow = "2";
      cell.style.top = "34px";
      cell.dataset.date = iso;
      cell.innerHTML = '<span class="dnum">' + Roster.dayNum(iso) + '</span><span>' + Roster.weekdayLetter(iso) + '</span>';
      grid.appendChild(cell);
    });

    // spans
    var spans = Roster.buildSpans(filteredDuties, peopleById, DATA.sprints);
    var visibleSprintIds = {};
    visibleSprintIds[sprintA.id] = true;
    visibleSprintIds[sprintB.id] = true;
    var relevant = spans.filter(function (s) { return visibleSprintIds[s.sprintId]; });

    var LANE_H = 44, LANE_GAP = 4, ROW_PAD = 8;

    gridRows.forEach(function (gr, i) {
      var gridRow = i + 3;

      if (gr.type === "dept-header") {
        var hdr = document.createElement("div");
        hdr.className = "dept-section-row";
        hdr.style.gridColumn = "1 / -1";
        hdr.style.gridRow = gridRow + "";
        hdr.innerHTML = '<span class="dept-section-label"></span>';
        hdr.firstChild.textContent = gr.deptName;
        grid.appendChild(hdr);
        return;
      }

      var col = gr.col;
      var colSpans = relevant.filter(function (s) { return s.departmentId === col.deptId && (col.groupId === null || s.groupId === col.groupId); }).slice();
      var laneCount = Roster.assignLanes(colSpans) || 1;
      var rowHeight = laneCount * LANE_H + (laneCount - 1) * LANE_GAP + ROW_PAD * 2;

      var label = document.createElement("div");
      label.className = "dept-label-cell" + (col.isGrouped ? " is-group" : "");
      label.style.gridColumn = "1";
      label.style.gridRow = gridRow + "";
      label.textContent = col.isGrouped ? col.groupName : col.deptName;
      grid.appendChild(label);

      var body = document.createElement("div");
      body.className = "dept-body-cell";
      body.style.gridColumn = "2 / span " + days.length;
      body.style.gridRow = gridRow + "";
      body.style.height = rowHeight + "px";
      body.setAttribute("role", "gridcell");

      days.forEach(function (iso, idx) {
        var bg = document.createElement("div");
        bg.className = "col-bg" + (Roster.isWeekendISO(iso) ? " weekend" : "");
        bg.style.left = (idx * dayW) + "px";
        bg.style.width = dayW + "px";
        body.appendChild(bg);
      });

      var covered = new Array(days.length).fill(false);
      colSpans.forEach(function (span) {
        var s = dayIndex[span.start], e = dayIndex[span.end];
        for (var i2 = s; i2 <= e; i2++) covered[i2] = true;
        var card = Roster.renderCard(span, peopleById, departmentsById, { compact: (e - s + 1) < 2 });
        card.style.left = (s * dayW + 3) + "px";
        card.style.width = ((e - s + 1) * dayW - 6) + "px";
        card.style.top = (ROW_PAD + span.lane * (LANE_H + LANE_GAP)) + "px";
        body.appendChild(card);
      });
      covered.forEach(function (isCovered, idx) {
        if (isCovered) return;
        var dash = document.createElement("div");
        dash.className = "empty-dash-abs";
        dash.style.left = (idx * dayW) + "px";
        dash.style.width = dayW + "px";
        dash.innerHTML = '<span class="empty-dash">—</span>';
        body.appendChild(dash);
      });

      grid.appendChild(body);
    });

    // today vertical line
    if (dayIndex[DATA.today] !== undefined) {
      var line = document.createElement("div");
      line.className = "today-line";
      line.style.left = (240 + dayIndex[DATA.today] * dayW) + "px";
      line.style.height = grid.scrollHeight + "px";
      grid.appendChild(line);
    }

    Roster.wireHighlight(grid);

    if (!renderSprint2._scrolled) {
      renderSprint2._scrolled = true;
      requestAnimationFrame(function () {
        var el = document.querySelector('.day-head-cell[data-date="' + DATA.today + '"]');
        if (el) el.scrollIntoView({ inline: "center", block: "nearest" });
      });
    }
  }

  // ============================================================= quarter =

  function isoWeeksOfQuarter(anchor) {
    var start = mondayOnOrBefore(anchor);
    var weeks = [];
    for (var i = 0; i < 13; i++) {
      var wStart = Roster.addDaysDate(start, i * 7);
      var wEnd = Roster.addDaysDate(wStart, 6);
      weeks.push({ start: Roster.toISO(wStart), end: Roster.toISO(wEnd) });
    }
    return weeks;
  }

  function renderQuarter(visibleDepts, filteredDuties) {
    var anchor = state.quarterAnchor;
    var q = Math.floor(anchor.getMonth() / 3) + 1;
    document.getElementById("periodLabel").textContent = anchor.getFullYear() + " · Q" + q;
    document.getElementById("prevBtn").disabled = false;
    document.getElementById("nextBtn").disabled = false;

    var weeks = isoWeeksOfQuarter(anchor);
    var dayW = setColumnsVar(weeks.length);
    var gridRows = buildGridRows(visibleDepts);

    var grid = document.getElementById("tlGrid");
    grid.innerHTML = "";
    grid.style.gridTemplateColumns = "240px repeat(" + weeks.length + ", var(--day-w))";
    grid.style.gridTemplateRows = "34px 40px repeat(" + gridRows.length + ", auto)";

    var corner = document.createElement("div");
    corner.className = "corner-cell";
    corner.textContent = "Департамент";
    grid.appendChild(corner);

    // Спринты — ровно 2 недели, и обе всегда попадают в один и тот же
    // спринт (14 дней = 2 понедельника), поэтому недели можно без остатка
    // сгруппировать по спринтам и показать их colspan-ячейками в верхней
    // строке — как в режиме "2 спринта" — вместо одной плоской надписи
    // "квартал" на весь ряд.
    var sprintGroups = [];
    weeks.forEach(function (w, idx) {
      var sprint = DATA.sprints.find(function (s) { return w.start >= s.start && w.start <= s.end; });
      var last = sprintGroups[sprintGroups.length - 1];
      if (last && last.sprint && sprint && last.sprint.id === sprint.id) {
        last.span++;
      } else {
        sprintGroups.push({ sprint: sprint, startIdx: idx, span: 1 });
      }
    });
    sprintGroups.forEach(function (g) {
      var cell = document.createElement("div");
      cell.className = "sprint-head-cell";
      cell.style.gridColumn = (g.startIdx + 2) + " / span " + g.span;
      cell.style.gridRow = "1";
      // Узкая колонка недели (не 14 колонок дня, как в "2 спринта") — диапазон
      // дат сюда не помещается и переносится на 2 строки, наезжая на ряд
      // недель снизу. Показываем только ID + бейдж, диапазон и так виден
      // в подписях недель ниже.
      if (g.sprint) {
        cell.className += " sprint-clickable";
        cell.dataset.tooltip = Roster.formatRangeFull(g.sprint.start, g.sprint.end);
        cell.dataset.sprintId = g.sprint.id;
        cell.tabIndex = 0;
        cell.setAttribute("role", "button");
        cell.setAttribute("aria-label", "Сводка по спринту " + g.sprint.id);
        cell.innerHTML = "<span>" + g.sprint.id + "</span>" +
          (g.sprint.current ? '<span class="badge badge-success">Текущий</span>' : "");
      } else {
        cell.textContent = "—";
      }
      grid.appendChild(cell);
    });

    var todayISO = DATA.today;
    weeks.forEach(function (w, idx) {
      var isCurrentWeek = todayISO >= w.start && todayISO <= w.end;
      var cell = document.createElement("div");
      cell.className = "day-head-cell" + (isCurrentWeek ? " is-current-period" : "");
      cell.style.gridColumn = (idx + 2) + "";
      cell.style.gridRow = "2";
      cell.style.top = "34px";
      cell.innerHTML = '<span class="dnum">' + Roster.dayNum(w.start) + " " + Roster.monthShort(w.start) + '</span><span>нед.</span>';
      grid.appendChild(cell);
    });

    gridRows.forEach(function (gr, i) {
      var gridRow = i + 3;

      if (gr.type === "dept-header") {
        var hdr = document.createElement("div");
        hdr.className = "dept-section-row";
        hdr.style.gridColumn = "1 / -1";
        hdr.style.gridRow = gridRow + "";
        hdr.innerHTML = '<span class="dept-section-label"></span>';
        hdr.firstChild.textContent = gr.deptName;
        grid.appendChild(hdr);
        return;
      }

      var col = gr.col;
      var label = document.createElement("div");
      label.className = "dept-label-cell" + (col.isGrouped ? " is-group" : "");
      label.style.gridColumn = "1";
      label.style.gridRow = gridRow + "";
      label.textContent = col.isGrouped ? col.groupName : col.deptName;
      grid.appendChild(label);

      weeks.forEach(function (w, idx) {
        var cell = document.createElement("div");
        cell.className = "agg-cell";
        cell.style.gridColumn = (idx + 2) + "";
        cell.style.gridRow = gridRow + "";
        cell.style.height = "56px";

        var peopleInWeek = Roster.peopleInRange(filteredDuties, peopleById, col.deptId, w.start, w.end, col.groupId);
        if (peopleInWeek.length === 0) {
          cell.innerHTML = '<span class="empty-dash">—</span>';
        } else {
          var shown = peopleInWeek.slice(0, 3);
          var html = shown.map(function (p) {
            var partial = p.weekDays < 7 ? p.weekDays : null;
            var extra = ' tabindex="0" aria-label="' + Roster.escapeHtml(p.fullName) + ', ' + Roster.escapeHtml(columnLabel(col)) + ', неделя с ' + Roster.formatRangeFull(w.start, w.start) +
              (partial ? " (" + partial + " из 7 дней — часть недели)" : "") + '" data-person-id="' + p.id + '"';
            return Roster.avatarHtml(p, "avatar-sm", extra, p.isLead, partial);
          }).join("");
          if (peopleInWeek.length > 3) html += '<span class="agg-more">+' + (peopleInWeek.length - 3) + '</span>';
          cell.innerHTML = html;
        }
        grid.appendChild(cell);
      });
    });

    Roster.wireHighlight(grid);
  }

  // ================================================================ year =

  function renderYear(visibleDepts, filteredDuties) {
    var year = state.yearAnchor;
    document.getElementById("periodLabel").textContent = "" + year;
    document.getElementById("prevBtn").disabled = false;
    document.getElementById("nextBtn").disabled = false;

    var months = [];
    for (var m = 0; m < 12; m++) months.push(m);
    var dayW = setColumnsVar(12);
    var gridRows = buildGridRows(visibleDepts);

    var grid = document.getElementById("tlGrid");
    grid.innerHTML = "";
    grid.style.gridTemplateColumns = "240px repeat(12, var(--day-w))";
    grid.style.gridTemplateRows = "34px 40px repeat(" + gridRows.length + ", auto)";

    var corner = document.createElement("div");
    corner.className = "corner-cell";
    corner.textContent = "Департамент";
    grid.appendChild(corner);

    var yCell = document.createElement("div");
    yCell.className = "sprint-head-cell";
    yCell.style.gridColumn = "2 / span 12";
    yCell.style.gridRow = "1";
    yCell.textContent = year + " год";
    grid.appendChild(yCell);

    var todayDate = Roster.fromISO(DATA.today);
    months.forEach(function (m, idx) {
      var isCurrentMonth = todayDate.getFullYear() === year && todayDate.getMonth() === m;
      var cell = document.createElement("div");
      cell.className = "day-head-cell" + (isCurrentMonth ? " is-current-period" : "");
      cell.style.gridColumn = (idx + 2) + "";
      cell.style.gridRow = "2";
      cell.style.top = "34px";
      cell.innerHTML = '<span class="dnum">' + Roster.MONTHS_SHORT_UP(m) + '</span>';
      grid.appendChild(cell);
    });

    gridRows.forEach(function (gr, i) {
      var gridRow = i + 3;

      if (gr.type === "dept-header") {
        var hdr = document.createElement("div");
        hdr.className = "dept-section-row";
        hdr.style.gridColumn = "1 / -1";
        hdr.style.gridRow = gridRow + "";
        hdr.innerHTML = '<span class="dept-section-label"></span>';
        hdr.firstChild.textContent = gr.deptName;
        grid.appendChild(hdr);
        return;
      }

      var col = gr.col;
      var label = document.createElement("div");
      label.className = "dept-label-cell" + (col.isGrouped ? " is-group" : "");
      label.style.gridColumn = "1";
      label.style.gridRow = gridRow + "";
      label.textContent = col.isGrouped ? col.groupName : col.deptName;
      grid.appendChild(label);

      months.forEach(function (m, idx) {
        var mm = String(m + 1).padStart(2, "0");
        var monthStart = year + "-" + mm + "-01";
        var monthEnd = year + "-" + mm + "-" + String(new Date(year, m + 1, 0).getDate()).padStart(2, "0");

        var cell = document.createElement("div");
        cell.className = "agg-cell clickable";
        cell.style.gridColumn = (idx + 2) + "";
        cell.style.gridRow = gridRow + "";
        cell.style.height = "48px";
        cell.tabIndex = 0;
        cell.setAttribute("role", "button");

        var people = Roster.peopleInRange(filteredDuties, peopleById, col.deptId, monthStart, monthEnd, col.groupId);
        if (people.length === 0) {
          cell.innerHTML = '<span class="empty-dash">—</span>';
          cell.setAttribute("aria-label", columnLabel(col) + ", " + Roster.MONTHS_SHORT_UP(m) + " " + year + ", дежурств нет. Перейти к периоду.");
        } else {
          // колонка месяца уже недельной — показываем меньше аватаров,
          // чтобы не вылезать за пределы узкой ячейки
          var shown = people.slice(0, 2);
          var html = shown.map(function (p) {
            return Roster.avatarHtml(p, "avatar-sm", ' data-person-id="' + p.id + '"', p.isLead);
          }).join("");
          if (people.length > 2) html += '<span class="agg-more">+' + (people.length - 2) + '</span>';
          cell.innerHTML = html;
          var names = people.map(function (p) { return p.fullName + " (" + p.weekDays + " дн.)"; }).join(", ");
          cell.dataset.tooltip = names;
          cell.setAttribute("aria-label", columnLabel(col) + ", " + Roster.MONTHS_SHORT_UP(m) + " " + year + ": " + names + ". Перейти к периоду.");
        }
        cell.addEventListener("click", function () { jumpToMonth(year, m); });
        cell.addEventListener("keydown", function (e) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); jumpToMonth(year, m); } });
        grid.appendChild(cell);
      });
    });
  }

  function jumpToMonth(year, month) {
    var mid = new Date(year, month, 15);
    var midISO = Roster.toISO(mid);
    var idx = DATA.sprints.findIndex(function (s) { return midISO >= s.start && midISO <= s.end; });
    if (idx === -1) idx = 0;
    state.sprintPairStart = Math.max(0, Math.min(DATA.sprints.length - 2, idx > 0 ? idx - 1 : idx));
    state.zoom = "sprint2";
    zoomGroup.querySelectorAll(".btn").forEach(function (b) { b.setAttribute("aria-pressed", b.dataset.zoom === "sprint2" ? "true" : "false"); });
    render();
  }

  Roster.MONTHS_SHORT_UP = function (m) {
    return ["Янв", "Фев", "Мар", "Апр", "Май", "Июн", "Июл", "Авг", "Сен", "Окт", "Ноя", "Дек"][m];
  };

  render();

  Roster.enableTooltips(document.body);
  Roster.initSprintSummaryModal(document.getElementById("tlWrap"), {
    sprints: DATA.sprints,
    getContext: function () { return lastRenderContext; }
  });
})();
</script>
</body>
